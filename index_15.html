<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>1313 Контроль</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#F4F1EA; --surface:#FFFFFF; --surface2:#EEE9DE; --line:#E3DED3;
    --accent:#0F766E; --accent-dim:#0B5C55; --text:#1C1A17; --muted:#928C80;
    --danger:#C0392B; --ok:#0F766E; --warn:#B7791F;
    --pt:env(safe-area-inset-top,0px); --pb:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html{min-height:100vh;}
  html,body{background:var(--bg);color:var(--text);min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    font-variant-numeric:tabular-nums;}
  body{padding:calc(var(--pt) + 14px) 16px calc(var(--pb) + 24px);}
  .head{display:flex;align-items:center;gap:11px;margin:2px 0 18px;}
  .logo{width:46px;height:46px;border-radius:13px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .wm{font-size:17px;font-weight:800;}
  .wms{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px;}
  .clock{font-size:44px;font-weight:800;text-align:center;letter-spacing:1px;}
  .date{text-align:center;color:var(--muted);font-size:13px;margin-top:2px;}
  .status{text-align:center;margin-top:14px;font-size:15px;font-weight:600;}
  .status .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .muted{color:var(--muted);}

  .btns{display:flex;flex-direction:column;gap:12px;margin-top:4px;}
  .btn{border:none;border-radius:16px;padding:20px;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;width:100%;}
  .btn:disabled{opacity:.5;}
  .in{background:var(--ok);color:#fff;}
  .out{background:#3A352D;color:#F4F1EA;}
  .fines{background:var(--surface);color:var(--warn);border:1px solid var(--line)!important;font-size:16px;padding:16px;}
  .btn:active{filter:brightness(.92);}

  .hint{margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:13px;color:var(--muted);line-height:1.5;}
  .toast{position:fixed;left:50%;bottom:calc(var(--pb) + 30px);transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:50;
    opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}
  .big-msg{text-align:center;padding:14px;border-radius:14px;font-weight:700;margin-top:6px;}
  .msg-ok{background:rgba(61,214,140,.15);color:var(--ok);}
  .msg-late{background:rgba(255,176,32,.15);color:var(--warn);}
  .msg-err{background:rgba(255,92,92,.15);color:var(--danger);}

  .center{text-align:center;padding:40px 16px;}
  .center .ic{font-size:54px;margin-bottom:14px;}
  .center h2{font-size:20px;margin-bottom:8px;}
  .center p{color:var(--muted);font-size:14px;line-height:1.5;}

  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:40;}
  .ov.on{display:flex;}
  .sheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;
    padding:18px 16px calc(var(--pb) + 18px);border:1px solid var(--line);}
  .sheet h3{margin-bottom:6px;font-size:17px;text-align:center;}
  .sheet .who{text-align:center;color:var(--muted);font-size:13px;margin-bottom:14px;}
  .opt{display:flex;align-items:center;justify-content:space-between;width:100%;border:1px solid var(--line);border-radius:16px;
    padding:17px;font-size:16px;font-weight:800;margin-bottom:10px;background:var(--surface2);color:var(--text);}
  .opt .t{color:var(--muted);font-weight:700;font-size:14px;}
  .opt:active{border-color:var(--accent);}
  .cancel{width:100%;background:none;border:none;color:var(--muted);padding:12px;font-size:14px;}

  .tabs{display:flex;gap:7px;margin-bottom:14px;}
  .tab{flex:1;text-align:center;padding:11px 4px;border-radius:12px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:12px;}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px;border:1px solid var(--line);border-radius:13px;margin-bottom:9px;background:var(--surface);}
  .row .nm{font-weight:700;font-size:15px;}
  .row .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .mini{border:none;border-radius:10px;padding:9px 13px;font-weight:800;font-size:13px;color:#fff;}
  .ap{background:var(--ok);color:#fff;}
  .rj{background:var(--danger);}
  .rm{background:var(--surface2);color:var(--muted);border:1px solid var(--line);}
  .mk{background:var(--accent);}
  .badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:700;white-space:nowrap;}
  .b-ok{background:rgba(61,214,140,.15);color:var(--ok);}
  .b-late{background:rgba(255,176,32,.15);color:var(--warn);}
  .b-out{background:var(--surface2);color:var(--muted);}
  .b-fine{background:rgba(255,92,92,.15);color:var(--danger);}
  .empty{text-align:center;color:var(--muted);padding:26px;font-size:14px;}
  .refresh{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:12px;font-size:13px;font-weight:700;margin-top:4px;}
  .back{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;margin-bottom:12px;padding:4px 0;}
  .totalbar{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .totalbar .lbl{color:var(--muted);font-size:13px;}
  .totalbar .val{font-size:22px;font-weight:800;color:var(--danger);}
  .dayhead{color:var(--muted);font-size:12px;font-weight:700;margin:16px 2px 8px;text-transform:uppercase;letter-spacing:.5px;}
  .del{background:var(--bg);border:1px solid var(--line);color:var(--danger);border-radius:10px;padding:9px 13px;font-weight:800;font-size:14px;}
  .setrow{display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--muted);margin-bottom:12px;}
  .setrow input{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:16px;color:var(--text);font-weight:700;}
</style>
</head>
<body>
  <div class="head">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11a9 9 0 0 1 18 0"/><path d="M21 16v1a3 3 0 0 1-3 3h-2"/>
        <rect x="2" y="11" width="4" height="7" rx="1.5" fill="#fff" stroke="none"/>
        <rect x="18" y="11" width="4" height="7" rx="1.5" fill="#fff" stroke="none"/>
      </svg>
    </div>
    <div><div class="wm">1313 Контроль</div><div class="wms" id="sub">Колл-центр</div></div>
  </div>

  <div id="app"><div class="center"><div class="ic">⏳</div><p>Загрузка…</p></div></div>

  <!-- выбор смены -->
  <div class="ov" id="ovShift"><div class="sheet">
    <h3>Выберите смену</h3>
    <button class="opt" data-s="day">☀️ День <span class="t">08:00–19:00</span></button>
    <button class="opt" data-s="night">🌙 Ночь <span class="t">19:00–08:00</span></button>
    <button class="cancel" data-close="ovShift">Отмена</button>
  </div></div>

  <!-- отметить день (админ) -->
  <div class="ov" id="ovFine"><div class="sheet">
    <h3>Отметить день</h3>
    <div class="who" id="fineWho">—</div>
    <button class="opt" data-f="noshow">🚫 Прогул <span class="t">штраф 200 000</span></button>
    <button class="opt" data-f="excused">🤒 Уважительная <span class="t">−135 000 (день)</span></button>
    <button class="opt" data-f="dayoff">🌴 Выходной <span class="t">0</span></button>
    <button class="opt" data-f="custom">✏️ Свой штраф <span class="t">укажу сумму</span></button>
    <button class="cancel" data-close="ovFine">Отмена</button>
  </div></div>

  <!-- суммы штрафов (админ) -->
  <div class="ov" id="ovSet"><div class="sheet">
    <h3>Суммы штрафов</h3>
    <label class="setrow">Опоздание (&gt;15 мин), сум<input id="sLate" inputmode="numeric"></label>
    <label class="setrow">Прогул, сум<input id="sNoshow" inputmode="numeric"></label>
    <label class="setrow">Удержание за день, сум<input id="sDay" inputmode="numeric"></label>
    <button class="btn" id="saveSet" style="background:var(--accent);color:#fff;margin-top:2px;">Сохранить</button>
    <button class="cancel" data-close="ovSet">Отмена</button>
  </div></div>

  <div class="toast" id="toast"></div>

<script>
// ===================== НАСТРОЙКИ =====================
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx_ALNDqwqaXlol5-gLRQUpBdK2Ecn_PysFUTU-LOeDqscA_RAOJz-3nsOAsUl2pPAz/exec";
const OFFICE_LAT = 41.301312;
const OFFICE_LNG = 69.209314;
const RADIUS_M   = 200;
const SHIFTS = { day:{label:"День",start:"08:00"}, night:{label:"Ночь",start:"19:00"} };
const GRACE_MIN = 15;
let NOSHOW_FINE = 200000;
let DAY_DEDUCTION = 135000;
let SETTINGS = { late:30000, noshow:200000, daydeduct:135000 };
// ====================================================

const TG = window.Telegram && window.Telegram.WebApp;
if(TG){
  TG.ready(); TG.expand();
  try{ TG.setHeaderColor('#F4F1EA'); TG.setBackgroundColor('#F4F1EA'); }catch(e){}
  try{ TG.disableVerticalSwipes && TG.disableVerticalSwipes(); }catch(e){}
  try{ if(TG.requestFullscreen) TG.requestFullscreen(); }catch(e){}
  function applyInsets(){
    try{ var top=0;
      if(TG.contentSafeAreaInset && TG.contentSafeAreaInset.top) top+=TG.contentSafeAreaInset.top;
      if(TG.safeAreaInset && TG.safeAreaInset.top) top+=TG.safeAreaInset.top;
      if(top>0) document.body.style.paddingTop=(top+8)+"px";
    }catch(e){}
  }
  applyInsets();
  ['viewportChanged','fullscreenChanged','safeAreaChanged','contentSafeAreaChanged'].forEach(function(ev){
    try{ TG.onEvent && TG.onEvent(ev, function(){ TG.expand(); applyInsets(); }); }catch(e){}
  });
}
const user = (TG && TG.initDataUnsafe && TG.initDataUnsafe.user) || null;
const userId = user ? user.id : "web";
let userName = user ? ((user.first_name||"")+" "+(user.last_name||"")).trim() : "";
if(!userName){ userName = localStorage.getItem("cc_name") || ("ID "+userId); }

const $=id=>document.getElementById(id);
const app=$("app");
const toast=m=>{const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);};
const pad=n=>String(n).padStart(2,"0");
const haptic=t=>{try{TG&&TG.HapticFeedback.notificationOccurred(t);}catch(e){}};
const esc=s=>String(s==null?"":s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
const fmt=n=>Number(n||0).toLocaleString("ru-RU");

function jsonp(params){
  return new Promise((res,rej)=>{
    const cb="cb"+Math.random().toString(36).slice(2);
    const t=setTimeout(()=>{cleanup();rej("timeout");},20000);
    function cleanup(){ clearTimeout(t); delete window[cb]; if(s.parentNode)s.remove(); }
    window[cb]=d=>{ cleanup(); res(d); };
    const q=Object.keys(params).map(k=>k+"="+encodeURIComponent(params[k])).join("&");
    const s=document.createElement("script");
    s.src=WEBAPP_URL+"?"+q+"&callback="+cb;
    s.onerror=()=>{cleanup();rej("net");};
    document.body.appendChild(s);
  });
}
function post(obj){
  return fetch(WEBAPP_URL,{method:"POST",mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(obj)});
}

// закрытие оверлеев
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>$(b.dataset.close).classList.remove("on"));
const _ss=document.getElementById("saveSet");
if(_ss) _ss.onclick=async()=>{
  const late=Number(($("sLate").value||"").replace(/\D/g,""))||0;
  const noshow=Number(($("sNoshow").value||"").replace(/\D/g,""))||0;
  const daydeduct=Number(($("sDay").value||"").replace(/\D/g,""))||0;
  $("ovSet").classList.remove("on");
  try{ await post({action:"settings", late:late, noshow:noshow, daydeduct:daydeduct, adminId:userId}); }catch(e){}
  SETTINGS={late:late,noshow:noshow,daydeduct:daydeduct};
  haptic('success'); toast("Суммы обновлены");
  await new Promise(r=>setTimeout(r,700)); await loadAdmin(); drawAdmin();
};
document.querySelectorAll(".ov").forEach(o=>o.onclick=e=>{ if(e.target===o) o.classList.remove("on"); });

// ================= СТАРТ =================
(async function init(){
  let st;
  try{ st = await jsonp({mode:"status", id:userId}); }
  catch(e){ app.innerHTML='<div class="center"><div class="ic">⚠️</div><h2>Нет связи с сервером</h2><p>Проверьте интернет и откройте приложение заново.</p></div>'; return; }
  if(st.settings) SETTINGS=st.settings;
  if(st.admin){
    $("sub").textContent="Администратор";
    adminData={pending:st.pending||[],approved:st.approved||[],today:st.today||[],fines:st.fines||[]};
    drawAdmin(); return;
  }
  const status=st.status;
  if(status==="approved") return renderOperator();
  if(status==="pending") return renderPending();
  if(status==="rejected"||status==="removed") return renderRejected();
  try{ await post({action:"register", userId:userId, name:userName}); }catch(e){}
  renderPending(true);
})();

// ================= ОПЕРАТОР =================
function renderPending(justSent){
  $("sub").textContent="Оператор";
  app.innerHTML='<div class="center"><div class="ic">⏳</div><h2>Заявка отправлена</h2>'
    +'<p>'+(justSent?'Ваша заявка отправлена администратору.<br>':'')
    +'Ожидайте подтверждения. После одобрения здесь появятся кнопки отметки.</p>'
    +'<button class="refresh" id="rf">Обновить</button></div>';
  $("rf").onclick=()=>location.reload();
}
function renderRejected(){
  $("sub").textContent="Оператор";
  app.innerHTML='<div class="center"><div class="ic">🚫</div><h2>Доступ запрещён</h2><p>Обратитесь к администратору.</p></div>';
}
function renderOperator(){
  $("sub").textContent="Оператор";
  app.innerHTML=''
    +'<div class="card"><div class="clock" id="clock">--:--</div>'
    +'<div class="date" id="date">—</div><div class="status" id="ostatus"></div></div>'
    +'<div id="msg"></div>'
    +'<div class="btns"><button class="btn in" id="btnIn">✅ Я ПРИШЁЛ</button>'
    +'<button class="btn out" id="btnOut">🚪 Я УШЁЛ</button>'
    +'<button class="btn fines" id="btnFines">💰 Мои штрафы</button></div>'
    +'<div class="hint">📍 Отметка работает только в офисе. Разрешите доступ к геолокации, когда телефон спросит.</div>';
  tick(); if(!window._clk){ window._clk=setInterval(tick,20000); } renderOStatus();
  $("btnIn").onclick=()=>{ haptic('warning'); $("ovShift").classList.add("on"); };
  $("btnOut").onclick=()=>mark("out", null);
  $("btnFines").onclick=()=>renderMyFines();
}
function tick(){ const d=new Date(); if(!$("clock"))return;
  $("clock").textContent=pad(d.getHours())+":"+pad(d.getMinutes());
  const days=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
  const mon=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
  $("date").textContent=d.getDate()+" "+mon[d.getMonth()]+", "+days[d.getDay()]; }
function todayKey(){ const d=new Date(); return "cc_"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()); }
function getToday(){ try{ return JSON.parse(localStorage.getItem(todayKey())||"{}"); }catch(e){ return {}; } }
function setToday(o){ localStorage.setItem(todayKey(), JSON.stringify(o)); }
function renderOStatus(){ const t=getToday(),s=$("ostatus"); if(!s)return;
  if(t.in&&t.out) s.innerHTML='<span class="dot" style="background:var(--muted)"></span>Смена закрыта: '+t.in+' → '+t.out;
  else if(t.in) s.innerHTML='<span class="dot" style="background:var(--ok)"></span>На смене ('+(t.shift||'')+') с '+t.in+(t.late>0?(' · опоздание '+t.late+' мин'):'');
  else s.innerHTML='<span class="dot" style="background:var(--warn)"></span>Сегодня ещё не отмечен'; }

// смена
document.querySelectorAll('#ovShift .opt').forEach(b=>b.onclick=()=>{ $("ovShift").classList.remove("on"); mark("in", b.dataset.s); });

function lateMin(timeStr,startStr){ const p=startStr.split(":"),s=(+p[0])*60+(+p[1])+GRACE_MIN,q=timeStr.split(":"),n=(+q[0])*60+(+q[1]); return Math.max(0,n-s); }
function dist(a,b,c,d){ const R=6371000,r=x=>x*Math.PI/180,dA=r(c-a),dB=r(d-b);
  const x=Math.sin(dA/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dB/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function getPos(){ return new Promise((res,rej)=>{ if(!navigator.geolocation){rej("Геолокация недоступна");return;}
  navigator.geolocation.getCurrentPosition(p=>res(p.coords),
    e=>rej(e.code===1?"Доступ к геолокации запрещён":"Не удалось получить геолокацию"),
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}); }); }
function showMsg(h,c){ if($("msg"))$("msg").innerHTML='<div class="big-msg '+c+'">'+h+'</div>'; }

async function mark(action, shiftKey){
  const bIn=$("btnIn"),bOut=$("btnOut"); if(bIn)bIn.disabled=true; if(bOut)bOut.disabled=true;
  showMsg("📍 Проверяю геолокацию…","msg-ok");
  let coords; try{ coords=await getPos(); }
  catch(err){ showMsg("❌ "+err,"msg-err"); haptic('error'); if(bIn)bIn.disabled=false; if(bOut)bOut.disabled=false; return; }
  const dm=dist(coords.latitude,coords.longitude,OFFICE_LAT,OFFICE_LNG);
  if(dm>RADIUS_M){ showMsg("❌ Вы не в офисе (≈"+Math.round(dm)+" м).<br>Отметиться можно только на месте.","msg-err");
    haptic('error'); if(bIn)bIn.disabled=false; if(bOut)bOut.disabled=false; return; }
  const d=new Date(), timeStr=pad(d.getHours())+":"+pad(d.getMinutes());
  const shift=shiftKey?SHIFTS[shiftKey]:null;
  const lm=(action==="in"&&shift)?lateMin(timeStr,shift.start):0;
  try{ await post({action:action,shift:shiftKey,name:userName,userId:userId,lat:coords.latitude,lng:coords.longitude}); }catch(e){}
  const t=getToday();
  if(action==="in"){ t.in=timeStr; t.late=lm; t.shift=shift?shift.label:""; } else { t.out=timeStr; }
  setToday(t); renderOStatus();
  if(action==="in"){ const sh=shift?(" · смена «"+shift.label+"»"):"";
    if(lm>0) showMsg("⏰ Пришёл в "+timeStr+sh+"<br>Опоздание "+lm+" мин · штраф "+fmt(SETTINGS.late)+"","msg-late");
    else showMsg("✅ Пришёл вовремя ("+timeStr+")"+sh,"msg-ok");
  } else showMsg("👋 Ушёл в "+timeStr,"msg-ok");
  haptic('success'); if(bIn)bIn.disabled=false; if(bOut)bOut.disabled=false;
}

// Мои штрафы (оператор)
async function renderMyFines(){
  app.innerHTML='<button class="back" id="bk">‹ Назад</button><div class="center"><div class="ic">⏳</div><p>Загрузка…</p></div>';
  $("bk").onclick=()=>renderOperator();
  let r; try{ r=await jsonp({mode:"fines", id:userId}); }catch(e){ toast("Нет связи"); return; }
  const f=(r&&r.fines)||{items:[],total:0};
  let html='<button class="back" id="bk2">‹ Назад</button>'
    +'<div class="totalbar"><span class="lbl">Всего к удержанию</span><span class="val">'+fmt(f.total)+' сум</span></div>';
  if(!f.items.length) html+='<div class="empty">Штрафов нет — так держать! 👍</div>';
  else groupByDay(f.items).forEach(g=>{
    html+='<div class="dayhead">'+fmtDate(g.date)+'</div>';
    html+=g.items.map(it=>'<div class="row"><div><div class="nm">'+fmt(it.amount)+' сум</div>'
      +'<div class="sub">'+esc(it.reason)+'</div></div></div>').join("");
  });
  app.innerHTML=html;
  $("bk2").onclick=()=>renderOperator();
}
function groupByDay(items){ const g={}; items.forEach(it=>{(g[it.date]=g[it.date]||[]).push(it);});
  return Object.keys(g).sort().reverse().map(d=>({date:d,items:g[d]})); }
function fmtDate(d){ const p=String(d).split("-"); return p.length===3?(p[2]+"."+p[1]+"."+p[0].slice(2)):String(d); }
async function renderPersonFines(id, name){
  personView={id:id, name:name};
  app.innerHTML='<button class="back" id="bk">‹ К штрафам</button><div class="center"><div class="ic">⏳</div><p>Загрузка…</p></div>';
  $("bk").onclick=()=>{ personView=null; drawAdmin(); };
  let r; try{ r=await jsonp({mode:"fines", id:id}); }catch(e){ toast("Нет связи"); return; }
  const f=(r&&r.fines)||{items:[],total:0};
  let html='<button class="back" id="bk2">‹ К штрафам</button>'
    +'<div class="totalbar"><span class="lbl">'+esc(name||('ID '+id))+'</span><span class="val">'+fmt(f.total)+' сум</span></div>'
    +'<button class="btn" id="markDay" style="margin-bottom:14px;background:var(--accent);color:#fff;">+ Отметить день</button>';
  if(!f.items.length) html+='<div class="empty">Штрафов нет</div>';
  else groupByDay(f.items).forEach(g=>{
    html+='<div class="dayhead">'+fmtDate(g.date)+'</div>';
    html+=g.items.map(it=>'<div class="row"><div><div class="nm">'+fmt(it.amount)+' сум</div>'
      +'<div class="sub">'+esc(it.reason)+'</div></div>'
      +'<button class="del" data-del="'+esc(it.fineId)+'">✕</button></div>').join("");
  });
  app.innerHTML=html;
  $("bk2").onclick=()=>{ personView=null; drawAdmin(); };
  $("markDay").onclick=()=>{ fineTarget={id:id,name:name}; $("fineWho").textContent=name||("ID "+id); $("ovFine").classList.add("on"); };
  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Удалить этот штраф?"))return;
    try{ await post({action:"delfine", fineId:b.dataset.del, adminId:userId}); }catch(e){}
    haptic('success'); toast("Штраф удалён");
    await new Promise(r=>setTimeout(r,700)); renderPersonFines(id,name);
  });
}

// ================= АДМИН =================
let adminData={pending:[],approved:[],today:[],fines:[]}, adminTab="today", fineTarget=null, personView=null;
async function loadAdmin(){
  try{ const d=await jsonp({mode:"admin", adminId:userId});
    if(d.ok){ adminData={pending:d.pending||[],approved:d.approved||[],today:d.today||[],fines:d.fines||[]}; if(d.settings) SETTINGS=d.settings; } }
  catch(e){ toast("Нет связи"); }
}
function fineTotal(id){ const f=adminData.fines.find(x=>String(x.id)===String(id)); return f?f.total:0; }
function drawAdmin(){
  personView=null;
  const pc=adminData.pending.length;
  app.innerHTML='<div class="tabs">'
    +'<div class="tab '+(adminTab==="today"?"on":"")+'" data-t="today">Сегодня</div>'
    +'<div class="tab '+(adminTab==="pending"?"on":"")+'" data-t="pending">Заявки'+(pc?(' ('+pc+')'):'')+'</div>'
    +'<div class="tab '+(adminTab==="staff"?"on":"")+'" data-t="staff">Сотрудники</div>'
    +'<div class="tab '+(adminTab==="fines"?"on":"")+'" data-t="fines">Штрафы</div>'
    +'</div><div id="abody"></div><button class="refresh" id="rf">↻ Обновить</button>';
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{adminTab=t.dataset.t;drawAdmin();});
  $("rf").onclick=async()=>{ $("rf").textContent="Обновляю…"; await loadAdmin(); drawAdmin(); };
  const b=$("abody");
  b.innerHTML = adminTab==="today"?viewToday() : adminTab==="pending"?viewPending() : adminTab==="staff"?viewStaff() : viewFines();
  bindAdmin();
}
function viewToday(){ const t=adminData.today;
  if(!t.length) return '<div class="empty">Сегодня пока никто не отметился</div>';
  return t.slice().reverse().map(r=>{
    let badge=r.type==="уход"?'<span class="badge b-out">ушёл '+esc(r.time)+'</span>'
      :(Number(r.late)>0?'<span class="badge b-late">опоздал '+esc(r.late)+' мин</span>':'<span class="badge b-ok">вовремя</span>');
    return '<div class="row"><div><div class="nm">'+esc(r.name)+'</div>'
      +'<div class="sub">'+esc(r.shift||'')+' · '+esc(r.type)+' в '+esc(r.time)+'</div></div>'+badge+'</div>';
  }).join(""); }
function viewPending(){ const p=adminData.pending;
  if(!p.length) return '<div class="empty">Новых заявок нет</div>';
  return p.map(e=>'<div class="row"><div><div class="nm">'+esc(e.name||('ID '+e.id))+'</div>'
    +'<div class="sub">ID '+esc(e.id)+'</div></div>'
    +'<div style="display:flex;gap:7px"><button class="mini ap" data-ap="'+esc(e.id)+'">Одобрить</button>'
    +'<button class="mini rj" data-rj="'+esc(e.id)+'">✕</button></div></div>').join(""); }
function viewStaff(){ const a=adminData.approved;
  if(!a.length) return '<div class="empty">Пока нет одобренных сотрудников</div>';
  return a.map(e=>'<div class="row"><div><div class="nm">'+esc(e.name||('ID '+e.id))+'</div>'
    +'<div class="sub">ID '+esc(e.id)+'</div></div>'
    +'<button class="mini rm" data-rm="'+esc(e.id)+'">Убрать</button></div>').join(""); }
function viewFines(){ const a=adminData.approved;
  const head='<button class="refresh" id="openSet" style="margin:0 0 6px;">⚙ Изменить суммы штрафов</button>'
    +'<div style="margin:2px 2px 12px;color:var(--muted);font-size:12px;">Сейчас: опоздание '+fmt(SETTINGS.late)+' · прогул '+fmt(SETTINGS.noshow)+' · день '+fmt(SETTINGS.daydeduct)+'</div>';
  if(!a.length) return head+'<div class="empty">Сначала одобрите сотрудников</div>';
  return head + a.map(e=>{ const tot=fineTotal(e.id);
    return '<div class="row"><div><div class="nm">'+esc(e.name||('ID '+e.id))+'</div>'
      +'<div class="sub">'+(tot>0?('к удержанию '+fmt(tot)+' сум'):'без штрафов')+'</div></div>'
      +'<button class="mini mk" data-pf="'+esc(e.id)+'" data-nm="'+esc(e.name||'')+'">Открыть</button></div>';
  }).join(""); }
function bindAdmin(){
  document.querySelectorAll("[data-ap]").forEach(b=>b.onclick=()=>act("approve",b.dataset.ap,null,null,"Одобрен"));
  document.querySelectorAll("[data-rj]").forEach(b=>b.onclick=()=>act("reject",b.dataset.rj,null,null,"Отклонён"));
  document.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{ if(confirm("Убрать сотрудника?")) act("remove",b.dataset.rm,null,null,"Убран"); });
  document.querySelectorAll("[data-pf]").forEach(b=>b.onclick=()=>renderPersonFines(b.dataset.pf, b.dataset.nm));
  if($("openSet")) $("openSet").onclick=()=>{
    $("sLate").value=SETTINGS.late; $("sNoshow").value=SETTINGS.noshow; $("sDay").value=SETTINGS.daydeduct;
    $("ovSet").classList.add("on");
  };
}
// выбор типа отметки дня
document.querySelectorAll('#ovFine .opt').forEach(b=>b.onclick=async()=>{
  $("ovFine").classList.remove("on"); if(!fineTarget)return;
  const t=b.dataset.f; let reason,amount;
  if(t==="noshow"){ reason="Прогул"; amount=SETTINGS.noshow; }
  else if(t==="excused"){ reason="Отсутствие (уваж.)"; amount=SETTINGS.daydeduct; }
  else if(t==="dayoff"){ reason="Выходной"; amount=0; }
  else { const s=prompt("Сумма штрафа (сум):"); if(s===null)return; amount=Number(s.replace(/\D/g,""))||0;
         reason=prompt("Причина:","Штраф")||"Штраф"; }
  await fineAct(fineTarget.id, fineTarget.name, reason, amount);
});
async function fineAct(targetId,name,reason,amount){
  try{ await post({action:"fine", targetId:targetId, name:name, reason:reason, amount:amount, adminId:userId}); }catch(e){}
  haptic('success'); toast(reason+(amount?(" · "+fmt(amount)+" сум"):""));
  await new Promise(r=>setTimeout(r,700));
  if(personView){ renderPersonFines(personView.id, personView.name); }
  else { await loadAdmin(); drawAdmin(); }
}
async function act(action,targetId,_n,_a,msg){
  try{ await post({action:action, targetId:targetId, adminId:userId}); }catch(e){}
  haptic('success'); toast(msg);
  await new Promise(r=>setTimeout(r,700)); await loadAdmin(); drawAdmin();
}
</script>
</body>
