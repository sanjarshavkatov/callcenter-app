<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>1313 Контроль</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0E1424; --surface:#19203A; --surface2:#232C4A; --line:#2C3658;
    --accent:#5B7CFA; --accent-dim:#4763D6; --text:#E8EDF6; --muted:#8A95B5;
    --danger:#FF5C5C; --ok:#3DD68C; --warn:#FFB020;
    --pt:env(safe-area-inset-top,0px); --pb:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html{min-height:100vh;}
  html,body{background:var(--bg);color:var(--text);min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    font-variant-numeric:tabular-nums;}
  body{padding:calc(var(--pt) + 14px) 16px calc(var(--pb) + 24px);}
  .head{display:flex;align-items:center;gap:11px;margin:2px 0 18px;}
  .logo{width:46px;height:46px;border-radius:13px;background:var(--accent);
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .wm{font-size:17px;font-weight:800;}
  .wms{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px;}
  .clock{font-size:44px;font-weight:800;text-align:center;letter-spacing:1px;}
  .date{text-align:center;color:var(--muted);font-size:13px;margin-top:2px;}
  .status{text-align:center;margin-top:14px;font-size:15px;font-weight:600;}
  .status .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .muted{color:var(--muted);}

  .btns{display:flex;flex-direction:column;gap:12px;margin-top:4px;}
  .btn{border:none;border-radius:16px;padding:20px;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;}
  .btn:disabled{opacity:.5;}
  .in{background:var(--ok);color:#06251A;}
  .out{background:var(--surface2);color:var(--text);border:1px solid var(--line)!important;}
  .btn:active{filter:brightness(.92);}

  .hint{margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;font-size:13px;color:var(--muted);line-height:1.5;}
  .toast{position:fixed;left:50%;bottom:calc(var(--pb) + 30px);transform:translateX(-50%);
    background:var(--surface2);border:1px solid var(--line);color:var(--text);
    padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:40;
    opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:1;}
  .big-msg{text-align:center;padding:14px;border-radius:14px;font-weight:700;margin-top:6px;}
  .msg-ok{background:rgba(61,214,140,.15);color:var(--ok);}
  .msg-late{background:rgba(255,176,32,.15);color:var(--warn);}
  .msg-err{background:rgba(255,92,92,.15);color:var(--danger);}

  .center{text-align:center;padding:40px 16px;}
  .center .ic{font-size:54px;margin-bottom:14px;}
  .center h2{font-size:20px;margin-bottom:8px;}
  .center p{color:var(--muted);font-size:14px;line-height:1.5;}

  /* выбор смены */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:30;}
  .ov.on{display:flex;}
  .sheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;
    padding:18px 16px calc(var(--pb) + 18px);border:1px solid var(--line);}
  .sheet h3{margin-bottom:14px;font-size:17px;text-align:center;}
  .shift{display:flex;align-items:center;justify-content:space-between;width:100%;border:1px solid var(--line);border-radius:16px;
    padding:18px;font-size:17px;font-weight:800;margin-bottom:12px;background:var(--surface2);color:var(--text);}
  .shift .t{color:var(--muted);font-weight:600;font-size:14px;}
  .shift:active{border-color:var(--accent);}
  .cancel{width:100%;background:none;border:none;color:var(--muted);padding:12px;font-size:14px;}

  /* админка */
  .tabs{display:flex;gap:8px;margin-bottom:14px;}
  .tab{flex:1;text-align:center;padding:11px;border-radius:12px;background:var(--surface);border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:13px;}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px;border:1px solid var(--line);border-radius:13px;margin-bottom:9px;background:var(--surface);}
  .row .nm{font-weight:700;font-size:15px;}
  .row .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .mini{border:none;border-radius:10px;padding:9px 13px;font-weight:800;font-size:13px;color:#fff;}
  .ap{background:var(--ok);color:#06251A;}
  .rj{background:var(--danger);}
  .rm{background:var(--surface2);color:var(--muted);border:1px solid var(--line);}
  .badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:700;}
  .b-ok{background:rgba(61,214,140,.15);color:var(--ok);}
  .b-late{background:rgba(255,176,32,.15);color:var(--warn);}
  .b-out{background:var(--surface2);color:var(--muted);}
  .empty{text-align:center;color:var(--muted);padding:26px;font-size:14px;}
  .refresh{width:100%;background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:12px;padding:12px;font-size:13px;font-weight:700;margin-top:4px;}
</style>
</head>
<body>
  <div class="head">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11a9 9 0 0 1 18 0"/><path d="M21 16v1a3 3 0 0 1-3 3h-2"/>
        <rect x="2" y="11" width="4" height="7" rx="1.5" fill="#fff" stroke="none"/>
        <rect x="18" y="11" width="4" height="7" rx="1.5" fill="#fff" stroke="none"/>
      </svg>
    </div>
    <div><div class="wm">1313 Контроль</div><div class="wms" id="sub">Колл-центр</div></div>
  </div>

  <div id="app"><div class="center"><div class="ic">⏳</div><p>Загрузка…</p></div></div>

  <!-- выбор смены -->
  <div class="ov" id="ov"><div class="sheet">
    <h3>Выберите смену</h3>
    <button class="shift" data-s="day">☀️ День <span class="t">08:00–19:00</span></button>
    <button class="shift" data-s="night">🌙 Ночь <span class="t">19:00–08:00</span></button>
    <button class="cancel" id="cancelShift">Отмена</button>
  </div></div>

  <div class="toast" id="toast"></div>

<script>
// ===================== НАСТРОЙКИ =====================
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbx7DfR4PEvrL-7c8dGYNJb-djIxj9Xs0rtgi4nRP0ocMqTIVztrxiEZb5MSVwYfWOtq/exec";
const OFFICE_LAT = 41.301312;
const OFFICE_LNG = 69.209314;
const RADIUS_M   = 200;
const SHIFTS = { day:{label:"День",start:"08:00"}, night:{label:"Ночь",start:"19:00"} };
const GRACE_MIN = 15;
// ====================================================

const TG = window.Telegram && window.Telegram.WebApp;
if(TG){
  TG.ready(); TG.expand();
  try{ TG.setHeaderColor('#0E1424'); TG.setBackgroundColor('#0E1424'); }catch(e){}
  try{ TG.disableVerticalSwipes && TG.disableVerticalSwipes(); }catch(e){}
  try{ if(TG.requestFullscreen) TG.requestFullscreen(); }catch(e){}
  function applyInsets(){
    try{
      var top=0;
      if(TG.contentSafeAreaInset && TG.contentSafeAreaInset.top) top+=TG.contentSafeAreaInset.top;
      if(TG.safeAreaInset && TG.safeAreaInset.top) top+=TG.safeAreaInset.top;
      if(top>0) document.body.style.paddingTop=(top+8)+"px";
    }catch(e){}
  }
  applyInsets();
  ['viewportChanged','fullscreenChanged','safeAreaChanged','contentSafeAreaChanged'].forEach(function(ev){
    try{ TG.onEvent && TG.onEvent(ev, function(){ TG.expand(); applyInsets(); }); }catch(e){}
  });
}
const user = (TG && TG.initDataUnsafe && TG.initDataUnsafe.user) || null;
const userId = user ? user.id : "web";
let userName = user ? ((user.first_name||"")+" "+(user.last_name||"")).trim() : "";
if(!userName){ userName = localStorage.getItem("cc_name") || ("ID "+userId); }

const $=id=>document.getElementById(id);
const app=$("app");
const toast=m=>{const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);};
const pad=n=>String(n).padStart(2,"0");
const haptic=t=>{try{TG&&TG.HapticFeedback.notificationOccurred(t);}catch(e){}};
const esc=s=>String(s==null?"":s).replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));

// --- связь с сервером ---
function jsonp(params){
  return new Promise((res,rej)=>{
    const cb="cb"+Math.random().toString(36).slice(2);
    const t=setTimeout(()=>{cleanup();rej("timeout");},15000);
    function cleanup(){ clearTimeout(t); delete window[cb]; if(s.parentNode)s.remove(); }
    window[cb]=d=>{ cleanup(); res(d); };
    const q=Object.keys(params).map(k=>k+"="+encodeURIComponent(params[k])).join("&");
    const s=document.createElement("script");
    s.src=WEBAPP_URL+"?"+q+"&callback="+cb;
    s.onerror=()=>{cleanup();rej("net");};
    document.body.appendChild(s);
  });
}
function post(obj){
  return fetch(WEBAPP_URL,{method:"POST",mode:"no-cors",
    headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(obj)});
}

// ================= СТАРТ =================
(async function init(){
  let st;
  try{ st = await jsonp({mode:"status", id:userId}); }
  catch(e){ app.innerHTML='<div class="center"><div class="ic">⚠️</div><h2>Нет связи с сервером</h2><p>Проверьте интернет и откройте приложение заново.</p></div>'; return; }

  if(st.admin){
    $("sub").textContent="Администратор";
    adminData={pending:st.pending||[],approved:st.approved||[],today:st.today||[]};
    drawAdmin();
    return;
  }
  const status = st.status;
  if(status==="approved"){ return renderOperator(); }
  if(status==="pending"){ return renderPending(); }
  if(status==="rejected"||status==="removed"){ return renderRejected(); }
  // новый — отправляем заявку
  try{ await post({action:"register", userId:userId, name:userName}); }catch(e){}
  renderPending(true);
})();

// ================= ОПЕРАТОР: ЭКРАНЫ ДОСТУПА =================
function renderPending(justSent){
  $("sub").textContent="Оператор";
  app.innerHTML='<div class="center"><div class="ic">⏳</div><h2>Заявка отправлена</h2>'
    +'<p>'+(justSent?'Ваша заявка отправлена администратору.<br>':'')
    +'Ожидайте подтверждения. После одобрения здесь появятся кнопки отметки.</p>'
    +'<button class="refresh" id="rf">Обновить</button></div>';
  $("rf").onclick=()=>location.reload();
}
function renderRejected(){
  $("sub").textContent="Оператор";
  app.innerHTML='<div class="center"><div class="ic">🚫</div><h2>Доступ запрещён</h2>'
    +'<p>Обратитесь к администратору.</p></div>';
}

// ================= ОПЕРАТОР: ОТМЕТКА =================
function renderOperator(){
  $("sub").textContent="Оператор";
  app.innerHTML=''
    +'<div class="card"><div class="clock" id="clock">--:--</div>'
    +'<div class="date" id="date">—</div>'
    +'<div class="status" id="ostatus"></div></div>'
    +'<div id="msg"></div>'
    +'<div class="btns"><button class="btn in" id="btnIn">✅ Я ПРИШЁЛ</button>'
    +'<button class="btn out" id="btnOut">🚪 Я УШЁЛ</button></div>'
    +'<div class="hint">📍 Отметка работает только в офисе. Разрешите доступ к геолокации, когда телефон спросит.</div>';
  tick(); setInterval(tick,20000); renderOStatus();
  $("btnIn").onclick=()=>{ haptic('warning'); $("ov").classList.add("on"); };
  $("btnOut").onclick=()=>mark("out", null);
}
function tick(){
  const d=new Date(); if(!$("clock"))return;
  $("clock").textContent=pad(d.getHours())+":"+pad(d.getMinutes());
  const days=["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
  const mon=["янв","фев","мар","апр","мая","июн","июл","авг","сен","окт","ноя","дек"];
  $("date").textContent=d.getDate()+" "+mon[d.getMonth()]+", "+days[d.getDay()];
}
function todayKey(){ const d=new Date(); return "cc_"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()); }
function getToday(){ try{ return JSON.parse(localStorage.getItem(todayKey())||"{}"); }catch(e){ return {}; } }
function setToday(o){ localStorage.setItem(todayKey(), JSON.stringify(o)); }
function renderOStatus(){
  const t=getToday(); const s=$("ostatus"); if(!s)return;
  if(t.in && t.out) s.innerHTML='<span class="dot" style="background:var(--muted)"></span>Смена закрыта: '+t.in+' → '+t.out;
  else if(t.in) s.innerHTML='<span class="dot" style="background:var(--ok)"></span>На смене ('+(t.shift||'')+') с '+t.in+(t.late>0?(' · опоздание '+t.late+' мин'):'');
  else s.innerHTML='<span class="dot" style="background:var(--warn)"></span>Сегодня ещё не отмечен';
}
$("cancelShift").onclick=()=>$("ov").classList.remove("on");
$("ov").onclick=e=>{ if(e.target.id==="ov") $("ov").classList.remove("on"); };
document.querySelectorAll(".shift").forEach(b=>b.onclick=()=>{ $("ov").classList.remove("on"); mark("in", b.dataset.s); });

function lateMin(timeStr,startStr){ const p=startStr.split(":"),s=(+p[0])*60+(+p[1])+GRACE_MIN,q=timeStr.split(":"),n=(+q[0])*60+(+q[1]); return Math.max(0,n-s); }
function dist(a,b,c,d){ const R=6371000,r=x=>x*Math.PI/180,dA=r(c-a),dB=r(d-b);
  const x=Math.sin(dA/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dB/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function getPos(){ return new Promise((res,rej)=>{ if(!navigator.geolocation){rej("Геолокация недоступна");return;}
  navigator.geolocation.getCurrentPosition(p=>res(p.coords),
    e=>rej(e.code===1?"Доступ к геолокации запрещён":"Не удалось получить геолокацию"),
    {enableHighAccuracy:true,timeout:15000,maximumAge:0}); }); }
function showMsg(h,c){ if($("msg"))$("msg").innerHTML='<div class="big-msg '+c+'">'+h+'</div>'; }

async function mark(action, shiftKey){
  const bIn=$("btnIn"),bOut=$("btnOut"); if(bIn)bIn.disabled=true; if(bOut)bOut.disabled=true;
  showMsg("📍 Проверяю геолокацию…","msg-ok");
  let coords; try{ coords=await getPos(); }
  catch(err){ showMsg("❌ "+err,"msg-err"); haptic('error'); if(bIn)bIn.disabled=false; if(bOut)bOut.disabled=false; return; }
  const dm=dist(coords.latitude,coords.longitude,OFFICE_LAT,OFFICE_LNG);
  if(dm>RADIUS_M){ showMsg("❌ Вы не в офисе (≈"+Math.round(dm)+" м).<br>Отметиться можно только на месте.","msg-err");
    haptic('error'); if(bIn)bIn.disabled=false; if(bOut)bOut.disabled=false; return; }
  const d=new Date(), timeStr=pad(d.getHours())+":"+pad(d.getMinutes());
  const shift=shiftKey?SHIFTS[shiftKey]:null;
  const lm=(action==="in"&&shift)?lateMin(timeStr,shift.start):0;
  try{ await post({action:action,shift:shiftKey,name:userName,userId:userId,lat:coords.latitude,lng:coords.longitude}); }catch(e){}
  const t=getToday();
  if(action==="in"){ t.in=timeStr; t.late=lm; t.shift=shift?shift.label:""; } else { t.out=timeStr; }
  setToday(t); renderOStatus();
  if(action==="in"){ const sh=shift?(" · смена «"+shift.label+"»"):"";
    if(lm>0) showMsg("⏰ Пришёл в "+timeStr+sh+"<br>Опоздание "+lm+" мин","msg-late");
    else showMsg("✅ Пришёл вовремя ("+timeStr+")"+sh,"msg-ok");
  } else showMsg("👋 Ушёл в "+timeStr,"msg-ok");
  haptic('success'); if(bIn)bIn.disabled=false; if(bOut)bOut.disabled=false;
}

// ================= АДМИН =================
let adminData={pending:[],approved:[],today:[]}, adminTab="today";
async function renderAdmin(){
  $("sub").textContent="Администратор";
  app.innerHTML='<div class="center"><div class="ic">⏳</div><p>Загрузка данных…</p></div>';
  await loadAdmin(); drawAdmin();
}
async function loadAdmin(){
  try{ const d=await jsonp({mode:"admin", adminId:userId});
    if(d.ok){ adminData={pending:d.pending||[],approved:d.approved||[],today:d.today||[]}; } }
  catch(e){ toast("Нет связи"); }
}
function drawAdmin(){
  const pc=adminData.pending.length;
  app.innerHTML=''
    +'<div class="tabs">'
    +'<div class="tab '+(adminTab==="today"?"on":"")+'" data-t="today">Сегодня</div>'
    +'<div class="tab '+(adminTab==="pending"?"on":"")+'" data-t="pending">Заявки'+(pc?(' ('+pc+')'):'')+'</div>'
    +'<div class="tab '+(adminTab==="staff"?"on":"")+'" data-t="staff">Сотрудники</div>'
    +'</div><div id="abody"></div>'
    +'<button class="refresh" id="rf">↻ Обновить</button>';
  document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{adminTab=t.dataset.t;drawAdmin();});
  $("rf").onclick=async()=>{ $("rf").textContent="Обновляю…"; await loadAdmin(); drawAdmin(); };
  const b=$("abody");
  if(adminTab==="today") b.innerHTML=viewToday();
  else if(adminTab==="pending") b.innerHTML=viewPending();
  else b.innerHTML=viewStaff();
  bindAdminButtons();
}
function viewToday(){
  const t=adminData.today;
  if(!t.length) return '<div class="empty">Сегодня пока никто не отметился</div>';
  // последняя отметка по каждому
  return t.slice().reverse().map(r=>{
    let badge = r.type==="уход" ? '<span class="badge b-out">ушёл '+esc(r.time)+'</span>'
      : (Number(r.late)>0 ? '<span class="badge b-late">опоздал '+esc(r.late)+' мин</span>'
                          : '<span class="badge b-ok">вовремя</span>');
    return '<div class="row"><div><div class="nm">'+esc(r.name)+'</div>'
      +'<div class="sub">'+esc(r.shift||'')+' · '+esc(r.type)+' в '+esc(r.time)+'</div></div>'+badge+'</div>';
  }).join("");
}
function viewPending(){
  const p=adminData.pending;
  if(!p.length) return '<div class="empty">Новых заявок нет</div>';
  return p.map(e=>'<div class="row"><div><div class="nm">'+esc(e.name||('ID '+e.id))+'</div>'
    +'<div class="sub">ID '+esc(e.id)+' · '+esc(e.date||'')+'</div></div>'
    +'<div style="display:flex;gap:7px"><button class="mini ap" data-ap="'+esc(e.id)+'">Одобрить</button>'
    +'<button class="mini rj" data-rj="'+esc(e.id)+'">✕</button></div></div>').join("");
}
function viewStaff(){
  const a=adminData.approved;
  if(!a.length) return '<div class="empty">Пока нет одобренных сотрудников</div>';
  return a.map(e=>'<div class="row"><div><div class="nm">'+esc(e.name||('ID '+e.id))+'</div>'
    +'<div class="sub">ID '+esc(e.id)+'</div></div>'
    +'<button class="mini rm" data-rm="'+esc(e.id)+'">Убрать</button></div>').join("");
}
function bindAdminButtons(){
  document.querySelectorAll("[data-ap]").forEach(b=>b.onclick=async()=>{ await act("approve",b.dataset.ap,"Одобрен"); });
  document.querySelectorAll("[data-rj]").forEach(b=>b.onclick=async()=>{ await act("reject",b.dataset.rj,"Отклонён"); });
  document.querySelectorAll("[data-rm]").forEach(b=>b.onclick=async()=>{ if(confirm("Убрать сотрудника?")) await act("remove",b.dataset.rm,"Убран"); });
}
async function act(action,targetId,msg){
  try{ await post({action:action, targetId:targetId, adminId:userId}); }catch(e){}
  haptic('success'); toast(msg);
  await new Promise(r=>setTimeout(r,600)); // дать серверу записать
  await loadAdmin(); drawAdmin();
}
</script>
</body>
</html>
